<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GOAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="app.css" />
  <style>
    html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; }
    body { background: #111; }
    .frame-wrap { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="tabs.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [tab, setTab] = useState("STRONGER");

      const Views = {
        STRONGER: window.StrongerView,
        FASTER: window.FasterView,
        STEADIER: window.ReadyView,
        WIAHWIB: window.WhyView,
      };
      const View = Views[tab];

      return (
        <div className="goal-app" data-screen-label={tab}>
          <div className="goal-scroll">
            <View />
          </div>
          <BottomNav tab={tab} setTab={setTab} />
        </div>
      );
    }

    function Mount() {
      const [scale, setScale] = useState(1);
      const W = 402, H = 874;
      React.useEffect(() => {
        const fit = () => {
          const s = Math.min(window.innerWidth / W, window.innerHeight / H, 1);
          setScale(s);
        };
        fit();
        window.addEventListener('resize', fit);
        return () => window.removeEventListener('resize', fit);
      }, []);
      return (
        <div className="frame-wrap">
          <div style={{ transform: `scale(${scale})`, transformOrigin: 'center center' }}>
            <IOSDevice width={W} height={H} dark={false}>
              <App />
            </IOSDevice>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Mount />);
  </script>
</body>
</html>
